version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=http://localhost,https://yourdomain.com
      - ENVIRONMENT=production
    volumes:
      - uploads:/tmp/wikipicture
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.tasks.process.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    volumes:
      - uploads:/tmp/wikipicture
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A app.tasks.process.celery_app beat --loglevel=info
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  uploads:
